<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-8SBBXX72M7"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-8SBBXX72M7');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tragene Funded</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }
        
        .bg-starry-night {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d2d 100%);
            position: relative;
            min-height: 100vh;
            /* REMOVED overflow: hidden */
        }
        
        .stars {
            position: fixed; /* CHANGED from absolute to fixed */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1; /* ADDED this */
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 5s infinite;
        }
        
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        
        .liquid-glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .liquid-glass::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: 0.5s;
        }
        
        .liquid-glass:hover::before {
            left: 100%;
        }
        
        .shooting-star {
            position: fixed; /* CHANGED from absolute to fixed */
            width: 100px;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0) 0%, rgba(255,255,255,1) 50%, rgba(255,255,255,0) 100%);
            animation: shootingStar 5s linear infinite;
            z-index: -1; /* ADDED this */
        }
        
        @keyframes shootingStar {
            0% {
                transform: translateX(-100px) translateY(0) rotate(45deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            20% {
                transform: translateX(200px) translateY(200px) rotate(45deg);
                opacity: 0;
            }
            100% {
                opacity: 0;
            }
        }
        
        .glow-text {
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-starry-night text-white">
    <!-- Starry Background -->
    <div class="stars" id="stars"></div>
    
    <!-- Shooting Stars -->
    <div class="shooting-star" style="top: 20%; left: 10%; animation-delay: 2s;"></div>
    <div class="shooting-star" style="top: 60%; left: 30%; animation-delay: 5s;"></div>
    <div class="shooting-star" style="top: 40%; left: 70%; animation-delay: 8s;"></div>

    <!-- Navigation -->
    <nav class="bg-black/80 backdrop-blur-md shadow-xl w-full z-50 py-2 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="/" class="text-white font-bold flex items-center">
                        <div class="bg-gradient-to-r from-blue-600 to-cyan-500 px-3 py-1 rounded-lg">
                            <span class="flex items-center">
                                <i class="fas fa-chart-line text-white text-sm mr-2"></i>
                                <span class="text-white font-bold text-sm">TRAGENE FUNDED</span>
                            </span>
                        </div>
                    </a>
                </div>
                <div class="flex items-center space-x-3">
                    <a href="/login" class="bg-gradient-to-r from-blue-500 to-cyan-500 hover:from-blue-600 hover:to-cyan-600 text-white px-3 py-1 rounded-lg text-sm font-medium transition duration-300">
                        Login
                    </a>
                    <a href="/register" class="bg-gray-700 hover:bg-gray-600 text-white px-3 py-1 rounded-lg text-sm font-medium transition duration-300">
                        Get Started
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <div>
                <div class="flex justify-center">
                    <div class="liquid-glass p-3 rounded-xl">
                        <i class="fas fa-sign-in-alt text-cyan-400 text-2xl"></i>
                    </div>
                </div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-white glow-text">
                    Welcome Back
                </h2>
                <p class="mt-2 text-center text-sm text-gray-400">
                    Access your trading dashboard
                </p>
            </div>

            <form class="mt-8 space-y-6 liquid-glass p-8 rounded-2xl" action="/login" method="POST">
                <div class="space-y-4">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">Email Address</label>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                               class="relative block w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                               placeholder="trader@example.com">
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">Password</label>
                        <input id="password" name="password" type="password" autocomplete="current-password" required 
                               class="relative block w-full px-4 py-3 bg-gray-900/50 border border-gray-600 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition duration-200"
                               placeholder="••••••••">
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input id="remember_me" name="remember_me" type="checkbox" 
                                   class="h-4 w-4 text-blue-500 focus:ring-blue-500 border-gray-600 rounded bg-gray-900/50">
                            <label for="remember_me" class="ml-2 block text-sm text-gray-300">
                                Remember me
                            </label>
                        </div>

                        <div class="text-sm">
                            <a href="#" class="font-medium text-blue-400 hover:text-blue-300 transition duration-200">
                                Forgot password?
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Submit Button -->
                <div>
                    <button type="submit" 
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-200 transform hover:scale-[1.02]">
                        Sign in to Dashboard
                    </button>
                </div>

                <!-- Register Link -->
                <div class="text-center">
                    <span class="text-gray-400">Don't have an account?</span>
                    <a href="/register" class="font-medium text-blue-400 hover:text-blue-300 ml-1 transition duration-200">
                        Start your challenge
                    </a>
                </div>
            </form>

            <!-- Trust Badges -->
            <div class="text-center">
                <p class="text-xs text-gray-500 mb-4">Trusted by 10,000+ traders worldwide</p>
                <div class="flex justify-center space-x-6 opacity-60">
                    <div class="text-gray-400">🔒 Secure</div>
                    <div class="text-gray-400">⚡ Fast</div>
                    <div class="text-gray-400">💳 Easy Payouts</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Create stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const starCount = 100;
            
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Random position
                const left = Math.random() * 100;
                const top = Math.random() * 100;
                
                // Random size
                const size = Math.random() * 3;
                
                // Random animation delay
                const delay = Math.random() * 5;
                
                star.style.left = `${left}%`;
                star.style.top = `${top}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDelay = `${delay}s`;
                
                starsContainer.appendChild(star);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            createStars();
        });
    </script>
</body>
</html>
