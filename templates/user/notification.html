<!-- Notification Drawer Overlay -->
<div id="notifDrawerOverlay" class="fixed inset-0 bg-black/40 dark:bg-black/60 backdrop-blur-sm z-40 hidden transition-opacity duration-300 opacity-0" onclick="toggleNotifDrawer()"></div>

<!-- Notification Drawer Panel -->
<div id="notifDrawer" class="fixed right-0 top-0 h-screen w-full sm:w-[420px] bg-white/95 dark:bg-slate-900/95 backdrop-blur-lg border-l border-gray-200 dark:border-slate-800 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
    <!-- Header -->
    <div class="p-6 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 rounded-xl flex items-center justify-center">
                <i class="fas fa-bell text-blue-600 dark:text-blue-400"></i>
            </div>
            <div>
                <h3 class="font-bold text-lg text-gray-900 dark:text-white">Notifications</h3>
                <p id="notifSubtext" class="text-xs text-gray-500 dark:text-gray-400">0 unread messages</p>
            </div>
        </div>
        
        <div class="flex items-center space-x-2">
            <!-- Mark All Read -->
            <button id="markAllReadBtn" onclick="markAllNotificationsAsRead()" title="Mark all as read"
                class="p-2 text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                <i class="fas fa-check-double text-sm"></i>
            </button>
            <!-- Close -->
            <button onclick="toggleNotifDrawer()"
                class="p-2 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white rounded-lg hover:bg-gray-100 dark:hover:bg-gray-800 transition">
                <i class="fas fa-times text-sm"></i>
            </button>
        </div>
    </div>

    <!-- Scrollable Notification List -->
    <div id="notifListContainer" class="flex-1 overflow-y-auto p-4 space-y-3">
        <!-- Rendered dynamically -->
        <div class="flex justify-center items-center h-48">
            <i class="fas fa-circle-notch fa-spin text-2xl text-blue-600"></i>
        </div>
    </div>
</div>

<!-- Custom styles for drawer scrollbar -->
<style>
    #notifListContainer::-webkit-scrollbar {
        width: 5px;
    }
    #notifListContainer::-webkit-scrollbar-track {
        background: transparent;
    }
    #notifListContainer::-webkit-scrollbar-thumb {
        background: rgba(156, 163, 175, 0.2);
        border-radius: 10px;
    }
    #notifListContainer::-webkit-scrollbar-thumb:hover {
        background: rgba(156, 163, 175, 0.4);
    }
</style>

<!-- Notification Scripts -->
<script>
    // Toggle drawer slider
    function toggleNotifDrawer() {
        const drawer = document.getElementById('notifDrawer');
        const overlay = document.getElementById('notifDrawerOverlay');

        if (drawer.classList.contains('translate-x-full')) {
            // Open
            drawer.classList.remove('translate-x-full');
            overlay.classList.remove('hidden');
            setTimeout(() => overlay.classList.add('opacity-100'), 10);
            loadNotifications();
        } else {
            // Close
            drawer.classList.add('translate-x-full');
            overlay.classList.remove('opacity-100');
            setTimeout(() => overlay.classList.add('hidden'), 300);
        }
    }

    // Determine template icon
    function getNotificationIcon(title, is_global) {
        const t = title.toLowerCase();
        if (t.includes('kyc') || t.includes('verified') || t.includes('identity')) {
            return {
                icon: 'fas fa-id-card',
                bg: 'bg-emerald-100 dark:bg-emerald-950/40 text-emerald-600 dark:text-emerald-400'
            };
        } else if (t.includes('passed') || t.includes('challenge') || t.includes('trophy') || t.includes('payout')) {
            if (t.includes('payout') || t.includes('processed')) {
                return {
                    icon: 'fas fa-wallet',
                    bg: 'bg-green-100 dark:bg-green-950/40 text-green-600 dark:text-green-400'
                };
            }
            return {
                icon: 'fas fa-trophy',
                bg: 'bg-yellow-100 dark:bg-yellow-950/40 text-yellow-600 dark:text-yellow-400'
            };
        } else if (t.includes('warning') || t.includes('violation') || t.includes('breach') || t.includes('rule')) {
            return {
                icon: 'fas fa-exclamation-triangle',
                bg: 'bg-red-100 dark:bg-red-950/40 text-red-600 dark:text-red-400'
            };
        } else if (is_global) {
            return {
                icon: 'fas fa-bullhorn',
                bg: 'bg-purple-100 dark:bg-purple-950/40 text-purple-600 dark:text-purple-400'
            };
        }
        return {
            icon: 'fas fa-bell',
            bg: 'bg-blue-100 dark:bg-blue-950/40 text-blue-600 dark:text-blue-400'
        };
    }

    // Format human-friendly time since UTC
    function formatTimeSince(dateStr) {
        if (!dateStr) return '';
        // Parse date manually or via Date object
        const date = new Date(dateStr.replace(' ', 'T') + 'Z');
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24) return `${diffHours}h ago`;
        
        const diffDays = Math.floor(diffHours / 24);
        if (diffDays === 1) return 'Yesterday';
        if (diffDays < 7) return `${diffDays}d ago`;
        
        return date.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    // Fetch and load notifications
    async function loadNotifications() {
        const container = document.getElementById('notifListContainer');
        const subtext = document.getElementById('notifSubtext');
        
        try {
            const response = await fetch('/user/api/notifications');
            const data = await response.json();
            
            if (data.success) {
                updateUnreadBadges(data.unread_count);
                subtext.innerText = `${data.unread_count} unread messages`;
                
                if (data.notifications.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-16 text-center text-gray-500 dark:text-gray-400">
                            <div class="w-16 h-16 bg-gray-50 dark:bg-slate-800 rounded-full flex items-center justify-center mb-4">
                                <i class="fas fa-bell-slash text-2xl text-gray-400"></i>
                            </div>
                            <p class="font-semibold text-gray-700 dark:text-gray-300">You're all caught up!</p>
                            <p class="text-xs mt-1">No alerts or updates at this moment.</p>
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                data.notifications.forEach(notif => {
                    const iconStyle = getNotificationIcon(notif.title, notif.is_global);
                    const unreadDot = !notif.is_read ? '<span class="w-2.5 h-2.5 bg-blue-600 rounded-full shrink-0 animate-pulse"></span>' : '';
                    const notifClass = !notif.is_read 
                        ? 'bg-blue-50/50 dark:bg-blue-950/10 border-blue-100 dark:border-blue-950/20' 
                        : 'bg-white dark:bg-slate-800/40 border-gray-100 dark:border-slate-800/80';
                    
                    html += `
                        <div onclick="markNotificationRead(${notif.id}, this)" 
                            class="p-4 border rounded-xl flex items-start gap-3 cursor-pointer transition duration-200 hover:scale-[1.01] hover:shadow-md ${notifClass}">
                            <!-- Icon -->
                            <div class="w-10 h-10 rounded-xl flex items-center justify-center shrink-0 ${iconStyle.bg}">
                                <i class="${iconStyle.icon} text-base"></i>
                            </div>
                            <!-- Copy -->
                            <div class="flex-1 min-w-0">
                                <div class="flex items-center justify-between gap-2">
                                    <h4 class="text-sm font-semibold text-gray-900 dark:text-white truncate pr-1">${notif.title}</h4>
                                    ${unreadDot}
                                </div>
                                <p class="text-xs text-gray-600 dark:text-gray-300 mt-1 line-clamp-3 leading-relaxed whitespace-pre-wrap">${notif.message}</p>
                                <span class="text-[10px] text-gray-400 dark:text-gray-500 mt-2 block font-medium">
                                    ${formatTimeSince(notif.created_at)}
                                </span>
                            </div>
                        </div>
                    `;
                });
                
                container.innerHTML = html;
            } else {
                container.innerHTML = `<div class="text-center text-red-500 py-10 text-xs">Error loading notifications.</div>`;
            }
        } catch (error) {
            console.error("Notifications fetch error:", error);
            container.innerHTML = `<div class="text-center text-red-500 py-10 text-xs">Failed to connect to server.</div>`;
        }
    }

    // Mark single notification as read
    async function markNotificationRead(id, element) {
        // Only trigger request if element indicates it is unread
        const dot = element.querySelector('.bg-blue-600');
        if (!dot) return; // Already read

        try {
            const response = await fetch('/user/api/notifications/read', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ notification_id: id })
            });
            const data = await response.json();
            if (data.success) {
                // Style updates
                dot.remove();
                element.classList.remove('bg-blue-50/50', 'dark:bg-blue-950/10', 'border-blue-100', 'dark:border-blue-950/20');
                element.classList.add('bg-white', 'dark:bg-slate-800/40', 'border-gray-100', 'dark:border-slate-800/80');
                
                // Fetch new unread count
                const countResp = await fetch('/user/api/notifications');
                const countData = await countResp.json();
                if (countData.success) {
                    updateUnreadBadges(countData.unread_count);
                    document.getElementById('notifSubtext').innerText = `${countData.unread_count} unread messages`;
                }
            }
        } catch (err) {
            console.error("Error marking read:", err);
        }
    }

    // Mark all as read
    async function markAllNotificationsAsRead() {
        try {
            const response = await fetch('/user/api/notifications/read-all', {
                method: 'POST'
            });
            const data = await response.json();
            if (data.success) {
                // Reload list to render instantly
                await loadNotifications();
            }
        } catch (err) {
            console.error("Error marking all read:", err);
        }
    }

    // Helper to update unread counts and dots in the layout
    function updateUnreadBadges(count) {
        const badges = document.querySelectorAll('.notif-badge');
        badges.forEach(badge => {
            if (count > 0) {
                badge.innerText = count > 9 ? '9+' : count;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        });
        
        const dots = document.querySelectorAll('.notif-dot');
        dots.forEach(dot => {
            if (count > 0) {
                dot.classList.remove('hidden');
            } else {
                dot.classList.add('hidden');
            }
        });
    }

    // Check notifications on load
    document.addEventListener('DOMContentLoaded', () => {
        loadNotifications();
        // Periodically pull every 60 seconds
        setInterval(loadNotifications, 60000);
    });
</script>
